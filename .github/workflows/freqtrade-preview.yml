name: FreqTrade Preview

on:
  pull_request:
    paths:
      - 'freqtrade_strategy/**'

jobs:
  backtest:
    name: Backtest Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install FreqTrade
        run: |
          pip install freqtrade
          pip install technical 2>/dev/null || true

      - name: Validate strategy syntax
        run: |
          python -c "
          import ast
          with open('freqtrade_strategy/pfaa_btc_strategy.py') as f:
              ast.parse(f.read())
          print('Strategy syntax: OK')
          "

      - name: Post result
        if: always()
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const status = process.env.JOB_STATUS === 'success' ? 'pass' : 'fail';
            const icon = status === 'pass' ? ':white_check_mark:' : ':x:';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## FreqTrade Strategy Preview ${icon}\n\nStrategy syntax validation: ${status}\n\n> Full backtesting requires FreqTrade data download (skipped in CI).`
            });
