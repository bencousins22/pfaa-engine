name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Ruff check
        run: ruff check agent_setup_cli/ jmem-mcp-server/jmem/ .claude/hooks/*.py --select E,F

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install pytest
          pip install -e . 2>/dev/null || true
          pip install -r requirements.txt 2>/dev/null || true
      - name: Run tests
        run: pytest tests/ -v --tb=short -x
        env:
          PYTHONPATH: ./jmem-mcp-server:./python:./

  typescript-lint:
    name: TypeScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Type check (root)
        run: npx tsc --noEmit
      - name: Type check (pfaa-cli)
        working-directory: pfaa-cli
        run: npm ci && npx tsc --noEmit

  typescript-test:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - working-directory: pfaa-cli
        run: npm ci
      - name: Run tests
        working-directory: pfaa-cli
        run: npx vitest run 2>/dev/null || echo "No vitest tests yet"
