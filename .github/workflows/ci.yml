name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx tsc --noEmit
      - name: TypeScript compiles
        run: echo "TypeScript OK"

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - name: Validate syntax
        run: |
          find python/ -name "*.py" | while read f; do
            python3 -c "import ast; ast.parse(open('$f').read())" || exit 1
          done
      - name: Run tests
        run: pytest tests/ -v
        env:
          PYTHONPATH: ./python:./
